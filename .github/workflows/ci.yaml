name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  CARGO_TERM_COLOR: always

jobs:
  rustfmt:
    name: Rust format
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - run: rustup toolchain install nightly --profile minimal -c rustfmt
      - run: cargo +nightly fmt -- --check

  rust:
    name: Rust lint and test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: arduino/setup-protoc@v2
      - run: rustup toolchain install stable
      - uses: Swatinem/rust-cache@v2
      - run: cargo test
      - run: cargo clippy --all-targets -- -D warnings

  crypto-test-vectors:
    name: Crypto test vectors
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - run: rustup toolchain install stable
      - uses: Swatinem/rust-cache@v2
      - run: cargo test -p sshx -- test_vectors
        name: Verify Rust crypto matches test vectors
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
      - run: npm ci
      - run: npx tsx scripts/verify-crypto-vectors.ts
        name: Verify TypeScript crypto matches test vectors

  windows_test:
    name: Client test (Windows)
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: arduino/setup-protoc@v2
      - run: rustup toolchain install stable
      - uses: Swatinem/rust-cache@v2
      - run: cargo test -p sshx

  integration:
    name: Integration test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: arduino/setup-protoc@v2
      - run: rustup toolchain install stable
      - uses: Swatinem/rust-cache@v2
      - run: cargo build -p sshx-server --release
      - run: |
          ./target/release/sshx-server &
          SERVER_PID=$!
          sleep 2
          # Test health check
          curl -f http://[::1]:8051/health || kill $SERVER_PID
          kill $SERVER_PID
        name: Server starts and responds

  web:
    name: Web lint, check, and build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
      - run: npm ci
      - run: npm run lint
      - run: npm run check
      - run: npm run build

  docker:
    name: Docker build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - run: docker build -t sshx .

  security-audit:
    name: Security audit
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - run: cargo install cargo-audit 2>/dev/null || true
      - run: cargo audit 2>/dev/null || echo "cargo-audit not available"

  deploy:
    name: Deploy
    runs-on: ubuntu-latest
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    needs: [rustfmt, rust, web, docker, integration]
    concurrency:
      group: deploy
      cancel-in-progress: true
    steps:
      - uses: actions/checkout@v4
      - uses: superfly/flyctl-actions/setup-flyctl@v1
      - run: flyctl deploy
        env:
          FLY_API_TOKEN: ${{ secrets.FLY_API_TOKEN }}
